kind = "web"
previewPath = "/"
title = "ATSFY Technologies"
version = "1.0.0"
id = "artifacts/atsfy-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19085
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/atsfy-landing run dev"

[services.env]
PORT = "19085"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/atsfy-landing", "run", "build"]
publicDir = "artifacts/atsfy-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
